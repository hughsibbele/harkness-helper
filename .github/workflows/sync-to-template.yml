name: Sync to Template

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout template repo
        uses: actions/checkout@v4
        with:
          repository: hughsibbele/HarknessHelperTemplate
          token: ${{ secrets.TEMPLATE_REPO_TOKEN }}
          path: template

      - name: Sync shared files
        run: |
          rsync -av --delete source/src/ template/src/
          rsync -av --delete source/docs/ template/docs/

      - name: Check for changes
        id: changes
        working-directory: template
        run: |
          git diff --quiet && git diff --cached --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        working-directory: template
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync src/ and docs/ from harkness-helper"
          git push
